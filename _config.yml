###########################################################
### Li Weiqi's Academic Homepage — Beautiful Jekyll config
###########################################################

############################
# --- Required options --- #
############################

title: Li Weiqi | 李伟祺
author: Li Weiqi

###############################################
# --- List of links in the navigation bar --- #
###############################################

navbar-links:
  Google Scholar: "https://scholar.google.com/citations?user=liwq229"
  GitHub: "https://github.com/liwq229"
  arXiv: "https://arxiv.org/search/?searchtype=author&query=Li+Weiqi"

################
# --- Logo --- #
################

avatar: "/assets/img/avatar-icon.png"
round-avatar: true

#####################################
# --- Footer social media links --- #
#####################################

social-network-links:
  email: "liwq229@mail2.sysu.edu.cn"
  github: liwq229
#  google-scholar: "your_scholar_id_here"
#  linkedin: yourname

rss-description: Li Weiqi's academic homepage — Embodied AI, VLA, Multimodal LLMs

###########################
# --- General options --- #
###########################

url-pretty: "liwq229.github.io"

post_search: false
edit_page_button: false
feed_show_excerpt: false
feed_show_tags: false

######################################
# --- Colours / background image --- #
######################################

navbar-col: "#FFFFFF"
navbar-text-col: "#333333"
navbar-border-col: "#E8E8E8"
page-col: "#FFFFFF"
text-col: "#333333"
link-col: "#1a6fa8"
hover-col: "#0e4f7a"
footer-col: "#F5F5F5"
footer-text-col: "#777777"
footer-link-col: "#555555"
footer-hover-col: "#1a6fa8"

################
# --- Misc --- #
################

date_format: "%B %-d, %Y"

timezone: "Asia/Shanghai"
markdown: kramdown
highlighter: rouge
permalink: /:year-:month-:day-:title/
paginate: 5

kramdown:
  input: GFM

defaults:
  -
    scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      comments: false
      social-share: false
  -
    scope:
      path: ""
    values:
      layout: "page"

exclude:
  - CHANGELOG.md
  - CNAME
  - Gemfile
  - Gemfile.lock
  - LICENSE
  - README.md
  - screenshot.png
  - docs/

plugins:
  - jekyll-paginate
  - jekyll-sitemap
